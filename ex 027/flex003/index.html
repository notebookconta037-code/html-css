<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudando sobre flex box</title>
    <style>
        div.container {
            background-color: rgb(188, 53, 53);
            display: flex;
            flex-flow: row wrap;
        }

        div.item {
            background-color: rgb(66, 66, 155);
            border: 2px solid rgb(105, 105, 226);
            width: 10%;
            text-align: center;
            flex: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">Exemplo de bloco <br> A</div>
        <div class="item">Exemplo de bloco <br> B</div>
        <div class="item">Exemplo de bloco <br> C</div>
        <div class="item">Exemplo de bloco <br> D</div>
        <div class="item">Exemplo de bloco <br> E</div>
        <div class="item">Exemplo de bloco <br> F</div>
        <div class="item">Exemplo de bloco <br> G</div>
    </div>
</body>
</html>
