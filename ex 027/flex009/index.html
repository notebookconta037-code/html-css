<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudando sobre flex box</title>
    <style>
        div.container {
            background-color: brown;
            display: flex;
            flex-flow: row nowrap;
        }

        div.item {
            background-color: blue;
            border: 2px solid black;

            text-align: center;
            flex-basis: 250px;
            flex-shrink: 1;
            flex-grow: 0;
        } 
    </style>
</head>
<body>
    <div class="container">
        <div class="item">a</div>
        <div class="item">b</div>
        <div class="item">c</div>
    </div>
</body>
</html>
